document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

002Fa> and the source code is available at <a href=\"[github link placeholder]\" target=\"_blank\" rel=\"noopener\">[github link placeholder]<\u002Fa>.<\u002Fp>\n    <\u002Fmain>\n\n    <aside class=\"panel-right\">\n      <div class=\"section-title\">Statistics<\u002Fdiv>\n      <div class=\"stat-grid\">\n        <div class=\"stat-card\"><div class=\"label\">Nodes<\u002Fdiv><div class=\"value\" id=\"stat-nodes\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"label\">Segments<\u002Fdiv><div class=\"value\" id=\"stat-segments\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"label\">Branch Pts<\u002Fdiv><div class=\"value\" id=\"stat-branches\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"label\">Anastomoses<\u002Fdiv><div class=\"value\" id=\"stat-anastomoses\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"label\">Avg Ø<\u002Fdiv><div class=\"value\" id=\"stat-diameter\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"label\">Total Length<\u002Fdiv><div class=\"value\" id=\"stat-length\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"label\">Danglers<\u002Fdiv><div class=\"value\" id=\"stat-danglers\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"label\">Iterations<\u002Fdiv><div class=\"value\" id=\"stat-iters\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card wide\"><div class=\"label\">Seed Used<\u002Fdiv><div class=\"value\" id=\"stat-seed\">—<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mini-chart\"><div class=\"label\">Diameter Distribution<\u002Fdiv><canvas class=\"chart-canvas\" id=\"chart-diameters\" width=\"460\" height=\"160\"><\u002Fcanvas><\u002Fdiv>\n      <div class=\"color-legend\"><div class=\"label\" id=\"legend-title\">Color Map: Position<\u002Fdiv><div class=\"legend-bar\" id=\"legend-bar\"><\u002Fdiv><div class=\"legend-labels\"><span id=\"legend-min\">Inlet<\u002Fspan><span id=\"legend-max\">Outlet<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <button class=\"btn-copy-stats\" id=\"btn-copy-stats\"><span class=\"material-icons-round\">content_copy<\u002Fspan> Copy Stats to Clipboard<\u002Fbutton>\n      <div class=\"section-title\" style=\"margin-top:6px\">Export<\u002Fdiv>\n      <div class=\"export-group\">\n        <label class=\"export-opt\"><input type=\"checkbox\" id=\"exp-csv\"><span class=\"exp-label\">Network Data<\u002Fspan><span class=\"exp-ext\">.csv<\u002Fspan><\u002Flabel>\n        <label class=\"export-opt\"><input type=\"checkbox\" id=\"exp-scad\"><span class=\"exp-label\">OpenSCAD<\u002Fspan><span class=\"exp-ext\">.scad<\u002Fspan><\u002Flabel>\n        <label class=\"export-opt\"><input type=\"checkbox\" id=\"exp-png\"><span class=\"exp-label\">PNG · no background<\u002Fspan><span class=\"exp-ext\">.png<\u002Fspan><\u002Flabel>\n      <\u002Fdiv>\n      <button class=\"btn-export\" id=\"btn-export\" disabled=\"\">Download Selected<\u002Fbutton>\n    <\u002Faside>\n  <\u002Fdiv>\n  <footer><span>2026 developed by<\u002Fspan><strong style=\"color:var(--text-dim)\">Aref Valipour<\u002Fstrong><span>with<\u002Fspan><span class=\"heart\">♥<\u002Fspan><\u002Ffooter>\n<\u002Fdiv>\n<div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){ return {}; }\n  componentDidMount(){\n    if (this._init) return; this._init = true;\n    const $=id=>document.getElementById(id);\n\n    class SeededRandom{constructor(s){this.seed=s||Math.floor(Math.random()*99999);this.state=this.seed}random(){this.state=(this.state*1103515245+12345)&0x7fffffff;return this.state/0x7fffffff}}\n\n    class VascularNetworkGenerator{constructor(p){this.params=p;this.rng=new SeededRandom(p.randomSeed===0?undefined:p.randomSeed);this.nodes=[];this.segments=[];this.segmentDiameters=[];this.activeTipsIdx=[];this.lastBranchSteps=[];this.vesselHistory=[];this.branchAngles=[];this.stats={iterations:0,totalNodes:0,totalSegments:0,branchPoints:0,anastomoses:0,avgDiameter:0,totalLength:0,danglers:0}}\n    generate(cb){this.init_();let i=0;const m=this.params.maxIterations;while(this.activeTipsIdx.length>0&&i<m){i++;if(i%100===0&&cb)cb(i,m);this.grow(i)}this.stats.iterations=i;this.postProc();this.calcStats();return{nodes:this.nodes,segments:this.segments,segmentDiameters:this.segmentDiameters,stats:this.stats,seed:this.rng.seed}}\n    init_(){const p=this.params,ae=[0,p.domainSize/2];this.outletPoint=[p.domainSize,p.domainSize/2];this.nodes.push(ae);this.nodes.push([ae[0]+p.stepSize*2,ae[1]]);this.segments.push([0,1]);this.segmentDiameters.push(this.calcD(ae[0]));this.lastBranchSteps=new Array(10000).fill(0);this.vesselHistory=new Array(10000).fill(null).map(()=>[]);this.branchAngles=new Array(10000).fill(0);for(let i=0;i<p.numInitialSprouts;i++){const ao=(this.rng.random()-.5)*(Math.PI/10);let np=[this.nodes[1][0]+p.stepSize*Math.cos(ao),this.nodes[1][1]+p.stepSize*Math.sin(ao)];if(np[0]<this.nodes[1][0])np[0]=this.nodes[1][0]+p.stepSize*.1;np[1]=p.domainSize/(p.numInitialSprouts+1)*(i+1);this.nodes.push(np);const ni=this.nodes.length-1;this.segments.push([1,ni]);this.segmentDiameters.push(this.calcD(np[0]));this.branchAngles[ni]=Math.atan2(np[1]-this.nodes[1][1],np[0]-this.nodes[1][0]);this.activeTipsIdx.push(ni)}}\n    grow(it){const ct=[...this.activeTipsIdx],tr=[],ta=[],na=[],sr=[],ns=[],nd=[];for(const ci of ct){if(!this.activeTipsIdx.includes(ci)||tr.includes(ci))continue;const cp=this.nodes[ci],ps=this.fp(ci);if(ps===-1){tr.push(ci);continue}const pi=this.segments[ps][0],gv=this.cg(cp,ci,pi);let np=[cp[0]+this.params.stepSize*gv[0],cp[1]+this.params.stepSize*gv[1]];if(np[0]<0||np[0]>this.params.domainSize||np[1]<0||np[1]>this.params.domainSize){tr.push(ci);continue}const rx=cp[0]/this.params.domainSize;if(this.dist(np,this.outletPoint)<this.params.stepSize&&rx>.9){np=[...this.outletPoint];tr.push(ci)}const ov=this.co(cp,np,ci,pi);if(ov.detected){this.ho(ov,ci,cp,sr,ns,nd);tr.push(ci);continue}const an=this.ca(np,ci,pi);if(an.shouldAnastomose){this.ha(an,ci,np,sr,ns,nd);tr.push(ci);continue}this.nodes.push(np);const nn=this.nodes.length-1;this.segments.push([ci,nn]);this.segmentDiameters.push(this.calcD((cp[0]+np[0])/2));this.branchAngles[nn]=Math.atan2(gv[1],gv[0]);if(!this.vesselHistory[ci]||!this.vesselHistory[ci].length)this.vesselHistory[nn]=[[...cp],[...np]];else{this.vesselHistory[nn]=[...this.vesselHistory[ci],[...np]];if(this.vesselHistory[nn].length>10)this.vesselHistory[nn]=this.vesselHistory[nn].slice(-10)}this.lastBranchSteps[nn]=this.lastBranchSteps[ci]+1;this.lastBranchSteps[ci]++;const br=this.cb(ci,cp,pi,rx,gv);if(br.shouldBranch){const bi=this.mkBranch(ci,br.branchVec);if(bi!==-1){ta.push(bi);this.lastBranchSteps[ci]=0}}na.push(nn);tr.push(ci)}this.us(sr,ns,nd);this.activeTipsIdx=this.activeTipsIdx.filter(i=>!tr.includes(i));this.activeTipsIdx.push(...na,...ta);this.activeTipsIdx=[...new Set(this.activeTipsIdx)]}\n    cg(cp,ci,pi){const p=this.params;let pd=[1,0];if(pi>=0){const gp=this.segments.map((s,i)=>({s,i})).filter(({s})=>s[1]===pi);if(gp.length>0){const gi=gp[gp.length-1].s[0];pd=[this.nodes[pi][0]-this.nodes[gi][0],this.nodes[pi][1]-this.nodes[gi][1]];const n=this.norm(pd);if(n>1e-6)pd=[pd[0]/n,pd[1]/n]}}const rx=cp[0]/p.domainSize,pm=rx>p.middleRegionEnd;let as,ra,vo;if(pm){as=Math.min(1,(rx-p.middleRegionEnd)/(1-p.middleRegionEnd)*p.outletInfluenceMax);vo=[this.outletPoint[0]-cp[0],this.outletPoint[1]-cp[1]];const n=this.norm(vo);if(n>1e-6)vo=[vo[0]/n,vo[1]/n];if(p.normalCancer===1)ra=(this.rng.random()-.5)*(Math.PI/2)*(1-as)-2*((cp[1]-.5*p.domainSize)/(.5*p.domainSize))*Math.min(1,1.3*cp[0]/p.domainSize);else ra=this.rng.random()-.5+.2*(1-as)-2*((cp[1]-.5*p.domainSize)/(.5*p.domainSize))*Math.min(1,1.3*cp[0]/p.domainSize)}else{as=.2;if(p.normalCancer===1)ra=p.angleWideness*(this.rng.random()-.5)*(Math.PI/2)-.7*((cp[1]-.5*p.domainSize)/(.5*p.domainSize))*(cp[0]/(.5*p.domainSize));else ra=(this.rng.random()-.5-.4*((cp[1]-.5*p.domainSize)/(.5*p.domainSize)))*Math.PI;vo=[1,(this.rng.random()-.5)*.4];const n=this.norm(vo);if(n>1e-6)vo=[vo[0]/n,vo[1]/n]}let pa=Math.atan2(pd[1],pd[0]);const pb=this.branchAngles[ci];if(pb&&!isNaN(pb))pa=(1-p.branchMemoryStrength)*pa+p.branchMemoryStrength*pb;const sa=pa+ra;let gv=[(1-as)*Math.cos(sa)+as*vo[0],(1-as)*Math.sin(sa)+as*vo[1]];const n=this.norm(gv);return n>1e-6?[gv[0]/n,gv[1]/n]:[1,0]}\n    co(cp,np,ci,pi){for(let si=0;si<this.segments.length;si++){const sg=this.segments[si];if((sg[0]===pi&&sg[1]===ci)||(sg[1]===pi&&sg[0]===ci))continue;const ix=this.li(cp,np,this.nodes[sg[0]],this.nodes[sg[1]]);if(ix.intersects&&ix.t1>.01&&ix.t1<.99&&ix.t2>.01&&ix.t2<.99&&this.dist(ix.point,cp)<this.params.stepSize)return{detected:true,segmentIdx:si,intersectionPoint:ix.point}}return{detected:false}}\n    ca(np,ci,pi){const p=this.params;let mdf=p.anastomosisDistNormal,tni=-1,tsi=-1,cpt=null;for(let k=this.segments.length-1;k>=0;k--){const sg=this.segments[k];if(sg[0]===0||sg[1]===0)continue;if((sg[0]===pi&&sg[1]===ci)||(sg[1]===pi&&sg[0]===ci)||sg[0]===pi||sg[1]===pi)continue;const p1=this.nodes[sg[0]],p2=this.nodes[sg[1]],d1=this.dist(np,p1),d2=this.dist(np,p2),{dist:ds,closestPoint:cs}=this.pld(np,p1,p2);if(d1<mdf&&sg[0]!==ci){tni=sg[0];tsi=-1;mdf=d1;cpt=p1}if(d2<mdf&&sg[1]!==ci){tni=sg[1];tsi=-1;mdf=d2;cpt=p2}if(ds<p.anastomosisDistNormal/2&&ds<mdf){tni=-1;tsi=k;mdf=ds;cpt=cs}}let tn=-1,ss=-1;if(tni!==-1)tn=tni;else if(tsi!==-1){this.nodes.push(cpt);tn=this.nodes.length-1;ss=tsi}if(tn!==-1){const lp=this.bfs(ci,tn);if(lp.length>0&&lp.length<p.minLoopNodes)return{shouldAnastomose:false}}return{shouldAnastomose:tn!==-1,targetNode:tn,segmentToSplit:ss}}\n    ho(ov,ci,cp,sr,ns,nd){this.nodes.push(ov.intersectionPoint);const ii=this.nodes.length-1;this.segments.push([ci,ii]);this.segmentDiameters.push(this.calcD((cp[0]+ov.intersectionPoint[0])/2));const os=this.segments[ov.seg dEventListener('click',()=>{zoomLevel=Math.max(.3,zoomLevel*.8);visualize()});\n    $('btn-zoom-reset').addEventListener('click',()=>{zoomLevel=1;panOffset={x:0,y:0};visualize()});\n    const cv=$('network-canvas');\n    cv.addEventListener('wheel',e=>{e.preventDefault();zoomLevel=Math.max(.3,Math.min(5,zoomLevel*(e.deltaY>0?.9:1.1)));visualize()},{passive:false});\n    cv.addEventListener('mousedown',e=>{isDragging=true;lastMouse={x:e.clientX,y:e.clientY};cv.style.cursor='grabbing'});\n    window.addEventListener('mousemove',e=>{if(!isDragging)return;panOffset.x+=e.clientX-lastMouse.x;panOffset.y+=e.clientY-lastMouse.y;lastMouse={x:e.clientX,y:e.clientY};visualize()});\n    window.addEventListener('mouseup',()=>{isDragging=false;$('network-canvas').style.cursor='crosshair'});\n    document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;if(e.key==='g'||e.key==='G'){e.preventDefault();generate()}if(e.key==='e'||e.key==='E'){e.preventDefault();if(networkData)exportData()}if(e.key==='r'||e.key==='R'){e.preventDefault();zoomLevel=1;panOffset={x:0,y:0};visualize()}if(e.key==='+'||e.key==='='){e.preventDefault();zoomLevel=Math.min(5,zoomLevel*1.15);visualize()}if(e.key==='-'){e.preventDefault();zoomLevel=Math.max(.3,zoomLevel*.85);visualize()}});\n    $('btn-help').addEventListener('click',()=>showToast('G: Generate · E: Export · R: Reset view · +/−: Zoom · Drag: Pan'));\n    $('btn-about').addEventListener('click',()=>showToast('μVasGen v1.0 · Cancer Neurobiology & Nanotechnology Group · Georgia Tech'));\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
